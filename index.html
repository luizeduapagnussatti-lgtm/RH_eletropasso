      var t = themes[themeId];
      if (!t) return;
      var s = document.documentElement.style;
      s.setProperty('--primary', t.p);
      s.setProperty('--primary-hover', t.h);
      s.setProperty('--primary-light', t.l);
      s.setProperty('--primary-light-dark', t.p + '20');
    } catch(e) {}
  })();
</script>

    window.dispatchEvent(new CustomEvent('pwa-install-available'));
